
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YURA AI - V0.1</title>
  <style>
    :root {
      --primary: #00ffff;
      --primary-alt: #ff00ff;
      --primary-dark: #0a1a2e;
      --primary-light: #00ffff;
      --accent-cyan: #00ffff;
      --accent-magenta: #ff00ff;
      --accent-electric: #00ff41;
      --bg-dark: #0a0e27;
      --bg-dark-secondary: #0f1435;
      --bg-card: rgba(15, 20, 53, 0.7);
      --bg-card-light: rgba(20, 30, 70, 0.6);
      --text-primary: #00ffff;
      --text-secondary: #88ccff;
      --border-color: rgba(0, 255, 255, 0.2);
      --shadow: 0 0 20px rgba(0, 255, 255, 0.3), inset 0 0 20px rgba(0, 255, 255, 0.05);
      --glow-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
      --radius: 12px;
    }

    [data-theme="light"] {
      --bg-dark: #f0f5ff;
      --bg-dark-secondary: #e8f1ff;
      --bg-card: rgba(255, 255, 255, 0.85);
      --bg-card-light: rgba(248, 252, 255, 0.8);
      --text-primary: #0a1a3e;
      --text-secondary: #2a5a8a;
      --border-color: rgba(0, 150, 255, 0.2);
      --shadow: 0 10px 30px rgba(0, 100, 200, 0.15);
      --glow-shadow: 0 0 20px rgba(0, 150, 255, 0.3);
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-dark-secondary) 100%);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
      position: relative;
      transition: all 0.5s ease;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 50%, rgba(0, 255, 255, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(255, 0, 255, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    
    /* Background particles with parallax */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.4;
    }
    
    /* Container utama dengan parallax support */
    .container {
      max-width: 100%;
      margin: 0 auto;
      padding: 20px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      z-index: 1;
    }
    
    /* Header dengan efek glow */
    .header {
      text-align: center;
      padding: 20px 0;
      position: relative;
      filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.3));
    }
    
    .main-title {
      font-size: 3em;
      font-weight: 900;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-magenta) 50%, var(--accent-cyan) 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
      text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
      position: relative;
      display: inline-block;
      animation: titleGlow 4s ease-in-out infinite, gradientFlow 6s ease infinite;
      font-family: 'Courier New', monospace;
    }
    
    @keyframes titleGlow {
      0%, 100% { 
        filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.5));
        text-shadow: 0 0 20px rgba(0, 255, 255, 0.7);
      }
      50% { 
        filter: drop-shadow(0 0 20px rgba(255, 0, 255, 0.6));
        text-shadow: 0 0 30px rgba(255, 0, 255, 0.8);
      }
    }
    
    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    .main-title::before {
      content: '';
      position: absolute;
      top: -10px;
      left: -10px;
      right: -10px;
      bottom: -10px;
      background: linear-gradient(45deg, transparent, rgba(0, 255, 255, 0.3), transparent);
      border-radius: 10px;
      opacity: 0;
      animation: holoBlink 3s ease-in-out infinite;
      z-index: -1;
    }
    
    @keyframes holoBlink {
      0%, 100% { opacity: 0; }
      50% { opacity: 0.5; }
    }
    
    .main-title::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
      border-radius: 2px;
      filter: blur(2px);
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
    }
    
    .subtitle {
      color: var(--text-secondary);
      font-size: 1.1em;
      font-weight: 600;
      letter-spacing: 1px;
      margin-top: 12px;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--text-secondary), var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .header-portfolio {
      display: none;
    }

    .header-portfolio a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--bg-card);
      color: var(--text-primary);
      border-radius: 10px;
      border: 1px solid var(--border-color);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95em;
      transition: all 0.3s ease;
      box-shadow: var(--shadow);
    }

    .header-portfolio a svg { width: 16px; height: 16px; }

    .header-portfolio a:hover {
      background: var(--bg-card-light);
      transform: translateY(-3px);
      box-shadow: var(--glow-shadow);
      border-color: rgba(0, 255, 255, 0.5);
    }

    @media (max-width: 560px) {
      .header-portfolio { display: inline-flex; margin-top: 8px; }
      .header-portfolio a { padding: 6px 10px; font-size: 0.85em; }
    }
    
    /* Status bar dengan efek cyber */
    .status-bar {
      display: flex;
      justify-content: space-between;
      background: var(--bg-card);
      padding: 14px 20px;
      border-radius: var(--radius);
      border: 2px solid var(--border-color);
      backdrop-filter: blur(20px);
      font-size: 0.9em;
      flex-wrap: wrap;
      box-shadow: var(--shadow), inset 0 0 15px rgba(0, 255, 255, 0.05);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .status-bar::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.2), transparent);
      animation: scanlines 8s linear infinite;
      z-index: 0;
      pointer-events: none;
    }
    
    @keyframes scanlines {
      0% { left: -100%; }
      100% { left: 100%; }
    }
    
    .status-bar:hover {
      transform: translateY(-2px);
      box-shadow: var(--glow-shadow), inset 0 0 20px rgba(0, 255, 255, 0.1);
      border-color: rgba(0, 255, 255, 0.6);
    }
    
    .status-item {
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      z-index: 1;
      color: var(--text-secondary);
    }
    
    .status-item strong {
      color: var(--accent-cyan);
      font-weight: 700;
    }
    
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, var(--accent-electric), var(--accent-cyan));
      box-shadow: 0 0 12px var(--accent-cyan), inset -1px -1px 3px rgba(0, 0, 0, 0.5);
      position: relative;
      animation: radioPulse 2s ease-in-out infinite;
    }
    
    @keyframes radioPulse {
      0%, 100% {
        box-shadow: 0 0 12px var(--accent-cyan), inset -1px -1px 3px rgba(0, 0, 0, 0.5);
        transform: scale(1);
      }
      50% {
        box-shadow: 0 0 20px var(--accent-cyan), inset -1px -1px 3px rgba(0, 0, 0, 0.5);
        transform: scale(1.1);
      }
    }
    
    .status-dot::after {
      content: '';
      position: absolute;
      top: -5px;
      left: -5px;
      right: -5px;
      bottom: -5px;
      border-radius: 50%;
      border: 1px solid rgba(0, 255, 255, 0.4);
      animation: orbitPulse 2s ease-in-out infinite;
    }
    
    @keyframes orbitPulse {
      0%, 100% { 
        transform: scale(0.8);
        opacity: 0.3;
      }
      50% { 
        transform: scale(1.2);
        opacity: 0;
      }
    }
    
    /* Chat container */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-card);
      border-radius: var(--radius);
      border: 2px solid var(--border-color);
      overflow: hidden;
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      transition: all 0.3s ease;
      position: relative;
    }
    
    .chat-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.5), transparent);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
    }
    
    .chat-container:hover {
      border-color: rgba(0, 255, 255, 0.6);
      box-shadow: var(--glow-shadow);
    }
    
    /* Chat log */
    .chat-log {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      background: linear-gradient(135deg, rgba(10, 14, 39, 0.8) 0%, rgba(20, 30, 70, 0.6) 100%);
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: background 0.3s ease;
      position: relative;
    }
    
    .chat-log::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        repeating-linear-gradient(
          0deg,
          rgba(0, 255, 255, 0.02) 0px,
          rgba(0, 255, 255, 0.02) 1px,
          transparent 1px,
          transparent 2px
        );
      pointer-events: none;
      z-index: 0;
      animation: scanlineAnimation 8s linear infinite;
    }
    
    @keyframes scanlineAnimation {
      0% { transform: translateY(0); }
      100% { transform: translateY(10px); }
    }
    
    [data-theme="light"] .chat-log {
      background: linear-gradient(135deg, rgba(240, 245, 255, 0.9) 0%, rgba(230, 240, 255, 0.8) 100%);
    }
    
    .chat-log::-webkit-scrollbar {
      width: 8px;
    }
    
    .chat-log::-webkit-scrollbar-track {
      background: rgba(0, 255, 255, 0.05);
      border-radius: 4px;
    }
    
    .chat-log::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, var(--accent-cyan), var(--accent-magenta));
      border-radius: 4px;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.4);
    }
    
    .chat-log::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, var(--accent-magenta), var(--accent-cyan));
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
    }
    
    /* Message styles - Cyberpunk */
    .message {
      display: flex;
      max-width: 100%;
      animation: messageAppear 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      z-index: 1;
    }
    
    @keyframes messageAppear {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    
    .user-message {
      justify-content: flex-end;
    }
    
    .ai-message {
      justify-content: flex-start;
    }
    
    .message-bubble {
      max-width: 80%;
      padding: 16px 20px;
      border-radius: 12px;
      position: relative;
      font-size: 1em;
      line-height: 1.6;
      box-shadow: var(--shadow);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      border: 1px solid;
    }
    
    .user-message .message-bubble {
      background: linear-gradient(135deg, rgba(0, 255, 255, 0.15) 0%, rgba(255, 0, 255, 0.1) 100%);
      color: var(--text-primary);
      border-color: rgba(0, 255, 255, 0.4);
      border-bottom-right-radius: 4px;
      box-shadow: 
        inset 0 0 20px rgba(0, 255, 255, 0.1),
        0 0 15px rgba(0, 255, 255, 0.2),
        0 0 30px rgba(0, 255, 255, 0.1);
    }
    
    .ai-message .message-bubble {
      background: linear-gradient(135deg, rgba(0, 255, 255, 0.08) 0%, rgba(255, 0, 255, 0.05) 100%);
      color: var(--text-primary);
      border-color: rgba(0, 255, 255, 0.3);
      border-bottom-left-radius: 4px;
      box-shadow: 
        inset 0 0 15px rgba(0, 255, 255, 0.05),
        0 0 10px rgba(0, 255, 255, 0.15);
    }
    
    .message-bubble:hover {
      transform: translateY(-3px);
      border-color: rgba(0, 255, 255, 0.6);
      box-shadow: 
        inset 0 0 25px rgba(0, 255, 255, 0.15),
        var(--glow-shadow);
    }
    
    .message-content {
      line-height: 1.7;
      position: relative;
      z-index: 1;
    }
    
    .message-content p {
      margin-bottom: 10px;
    }
    
    .message-content p:last-child {
      margin-bottom: 0;
    }
    
    .message-content ul, .message-content ol {
      margin: 12px 0;
      padding-left: 24px;
    }
    
    .message-content li {
      margin-bottom: 6px;
      color: var(--text-secondary);
    }
    
    /* Typing animation - Cyberpunk */
    .typing-animation {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 14px;
      background: linear-gradient(135deg, rgba(0, 255, 255, 0.1) 0%, rgba(255, 0, 255, 0.05) 100%);
      border-radius: 12px;
      border: 1px solid rgba(0, 255, 255, 0.3);
    }
    
    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, var(--accent-cyan), var(--accent-magenta));
      animation: cyberTyping 1.4s infinite ease-in-out;
      box-shadow: 0 0 8px var(--accent-cyan);
    }
    
    .typing-dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-dot:nth-child(2) { animation-delay: -0.16s; }
    .typing-dot:nth-child(3) { animation-delay: 0s; }
    
    @keyframes cyberTyping {
      0%, 80%, 100% { 
        transform: scale(0.6);
        opacity: 0.4;
      }
      40% { 
        transform: scale(1.2);
        opacity: 1;
      }
    }
    
    /* Code blocks - Cyberpunk */
    .code-block {
      background: linear-gradient(135deg, rgba(5, 10, 30, 0.95) 0%, rgba(10, 15, 40, 0.9) 100%);
      border: 1px solid rgba(0, 255, 255, 0.2);
      border-radius: 8px;
      padding: 16px;
      margin: 12px 0;
      font-family: 'Fira Code', 'JetBrains Mono', 'Consolas', 'Monaco', monospace;
      font-size: 0.9em;
      overflow-x: auto;
      position: relative;
      transition: all 0.3s ease;
      box-shadow: 
        inset 0 0 15px rgba(0, 255, 255, 0.05),
        0 0 20px rgba(0, 255, 255, 0.15);
    }
    
    [data-theme="light"] .code-block {
      background: linear-gradient(135deg, rgba(245, 250, 255, 0.95) 0%, rgba(240, 248, 255, 0.9) 100%);
      border-color: rgba(0, 150, 255, 0.2);
      color: #0a1a3e;
    }
    
    .code-block:hover {
      transform: translateY(-2px);
      border-color: rgba(0, 255, 255, 0.5);
      box-shadow: 
        inset 0 0 20px rgba(0, 255, 255, 0.1),
        var(--glow-shadow);
    }
    
    .code-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(0, 255, 255, 0.2);
    }
    
    .code-language {
      color: var(--accent-cyan);
      font-weight: 700;
      font-size: 0.85em;
      font-family: 'Inter', sans-serif;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .copy-code-btn {
      background: linear-gradient(135deg, rgba(0, 255, 255, 0.1), rgba(255, 0, 255, 0.05));
      color: var(--text-secondary);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 0.75em;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
    }
    
    .copy-code-btn:hover {
      background: linear-gradient(135deg, rgba(0, 255, 255, 0.2), rgba(255, 0, 255, 0.1));
      color: var(--accent-cyan);
      transform: translateY(-1px);
      border-color: rgba(0, 255, 255, 0.5);
      box-shadow: 0 0 12px rgba(0, 255, 255, 0.3);
    }
    
    /* Input area - Cyberpunk */
    .input-area {
      display: flex;
      gap: 12px;
      padding: 16px 20px;
      background: var(--bg-card);
      border-top: 2px solid var(--border-color);
      align-items: flex-end;
      transition: all 0.3s ease;
      position: relative;
    }
    
    .input-area::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.5), transparent);
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
    }
    
    .input-wrapper {
      flex: 1;
      position: relative;
    }
    
    .chat-input {
      width: 100%;
      padding: 13px 16px;
      border: 1px solid rgba(0, 255, 255, 0.2);
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(10, 20, 50, 0.6) 0%, rgba(15, 25, 60, 0.5) 100%);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 1em;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      resize: none;
      min-height: 48px;
      max-height: 120px;
      backdrop-filter: blur(15px);
    }
    
    .chat-input:focus {
      outline: none;
      border-color: var(--accent-cyan);
      background: linear-gradient(135deg, rgba(0, 50, 80, 0.7) 0%, rgba(10, 40, 70, 0.6) 100%);
      box-shadow: 
        0 0 0 3px rgba(0, 255, 255, 0.15),
        inset 0 0 15px rgba(0, 255, 255, 0.1),
        0 0 20px rgba(0, 255, 255, 0.2);
    }
    
    .chat-input::placeholder {
      color: var(--text-secondary);
      font-size: 1em;
      opacity: 0.7;
    }
    
    .send-btn {
      padding: 12px;
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(0, 255, 255, 0.15) 0%, rgba(255, 0, 255, 0.1) 100%);
      color: var(--accent-cyan);
      cursor: pointer;
      font-weight: 700;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 
        0 0 15px rgba(0, 255, 255, 0.2),
        inset 0 0 10px rgba(0, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
    }
    
    .send-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.3), transparent);
      transition: left 0.3s ease;
    }
    
    .send-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      border-color: var(--accent-cyan);
      background: linear-gradient(135deg, rgba(0, 255, 255, 0.25) 0%, rgba(255, 0, 255, 0.15) 100%);
      box-shadow: 
        var(--glow-shadow),
        inset 0 0 15px rgba(0, 255, 255, 0.15);
      color: #ffffff;
    }
    
    .send-btn:hover:not(:disabled)::before {
      left: 100%;
    }
    
    .send-btn:active:not(:disabled) {
      transform: translateY(0);
    }
    
    .send-btn:disabled {
      background: linear-gradient(135deg, rgba(80, 80, 100, 0.4) 0%, rgba(60, 60, 80, 0.3) 100%);
      color: var(--text-secondary);
      cursor: not-allowed;
      transform: none;
      border-color: rgba(100, 100, 120, 0.2);
      opacity: 0.5;
    }
    
    .send-btn svg {
      width: 20px;
      height: 20px;
      position: relative;
      z-index: 1;
    }
    
    /* Typing indicator */
    .typing-indicator {
      display: none;
      padding: 14px 18px;
      background: linear-gradient(135deg, rgba(0, 255, 255, 0.08) 0%, rgba(255, 0, 255, 0.05) 100%);
      margin: 0 20px 15px 20px;
      border-radius: 12px;
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-bottom-left-radius: 4px;
      max-width: 75%;
      align-self: flex-start;
      box-shadow: 
        inset 0 0 10px rgba(0, 255, 255, 0.05),
        0 0 15px rgba(0, 255, 255, 0.1);
    }
    
    /* Notification dengan efek glow */
    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 12px 18px;
      background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-card-light) 100%);
      border: 1px solid rgba(0, 255, 255, 0.3);
      color: var(--accent-cyan);
      border-radius: 10px;
      transform: translateX(150%);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);

    // Function to detect code in text
    function detectCodeBlocks(text) {
      let result = [];
      let remainingText = text;
      
      // Pattern untuk code blocks
      const codeBlockPattern = /```([a-zA-Z0-9_]+)?\s*([\s\S]*?)```/g;
      
      let match;
      let lastIndex = 0;
      
      while ((match = codeBlockPattern.exec(text)) !== null) {
        if (match.index > lastIndex) {
          result.push({
            type: 'text',
            content: text.substring(lastIndex, match.index)
          });
        }
        
        const language = match[1] || 'text';
        const codeContent = match[2].trim();
        
        result.push({
          type: 'code',
          language: language,
          content: codeContent
        });
        
        lastIndex = codeBlockPattern.lastIndex;
      }
      
      if (lastIndex < text.length) {
        result.push({
          type: 'text',
          content: text.substring(lastIndex)
        });
      }
      
      return result.length > 0 ? result : [{ type: 'text', content: text }];
    }

            .replace(/\n/g, '<br>');
          textContent.innerHTML = '<p>' + formattedContent + '</p>';
          textContent.style.whiteSpace = 'pre-wrap';
          contentDiv.appendChild(textContent);
        }
      });
      
      bubbleDiv.appendChild(contentDiv);
      messageDiv.appendChild(bubbleDiv);
      chatLog.appendChild(messageDiv);
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    // Copy to clipboard function
    function copyToClipboard(text, message) {
      const textArea = document.createElement('textarea');
      textArea.value = text;
      textArea.style.position = 'fixed';
      textArea.style.left = '-999999px';
      textArea.style.top = '-999999px';
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();
      
      try {
        const successful = document.execCommand('copy');
        if (successful) {
          showNotification(message);
        } else {
          showNotification('Failed to copy text!');
        }
      } catch (err) {
        console.error('Failed to copy: ', err);
        showNotification('Failed to copy text!');
      }
      
      document.body.removeChild(textArea);
    }

    // Show notification
    function showNotification(message) {
      notification.textContent = message;
      notification.classList.add('show');
      
      setTimeout(() => {
        notification.classList.remove('show');
      }, 2000);
    }

    // Show typing indicator
    function showTyping() {
      typingIndicator.style.display = 'block';
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    // Hide typing indicator
    function hideTyping() {
      typingIndicator.style.display = 'none';
    }



    // Send message function
    async function sendMessage() {
      const message = chatInput.value.trim(); 
      if (!message) return; 
      
      chatInput.value = ''; 
      chatInput.style.height = 'auto';
      sendBtn.disabled = true;
      addMessage(message, true);
      
      showTyping();
      
      try {
        // Add user message to conversation history
        conversationHistory.push({
          role: "user",
          parts: [{ text: message }]
        });

        // Send to serverless backend which holds the API key
        const response = await fetch(BACKEND_ENDPOINT, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            contents: conversationHistory
          })
        });

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const data = await response.json();
        
        if (data.candidates && data.candidates.length > 0) {
          const aiResponse = data.candidates[0].content.parts[0].text;
          
          // Add AI response to conversation history
          conversationHistory.push({
            role: "model",
            parts: [{ text: aiResponse }]
          });
          
          hideTyping();
          addMessage(aiResponse, false);
        } else {
          throw new Error('No response from AI');
        }
        
      } catch (error) {
        console.error('Error:', error);
        hideTyping();
        
        addMessage("System error. Please try again.", false);
      }
      
      sendBtn.disabled = false; 
      chatInput.focus();
    }

    // Event listeners
    sendBtn.addEventListener('click', sendMessage);
    
    // Enter untuk mengirim; Shift+Enter untuk baris baru
    chatInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Initialize particles
    createParticles();
    
    // Focus input on load
    chatInput.focus();
  </script>
</body>
</html>
